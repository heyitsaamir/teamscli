name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dotnet/nbgv@master
        id: nbgv
        with:
          stamp: package.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - run: npm pack && mv teams-*.tgz teamscli.tgz

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.nbgv.outputs.SimpleVersion }}
        run: |
          PREV_TAG=$(gh release list --limit 1 --exclude-drafts --json tagName -q '.[0].tagName // empty')
          NOTES="Install with:
          \`\`\`
          npm install -g https://github.com/heyitsaamir/teamscli/releases/latest/download/teamscli.tgz
          \`\`\`"
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$VERSION" ]; then
            NOTES="${NOTES}

          **Changes:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}"
          fi
          gh release create "$VERSION" teamscli.tgz \
            --title "$VERSION" \
            --notes "$NOTES" \
            --latest
