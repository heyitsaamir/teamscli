name: PR Teams Notification

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install microsoft-teams-apps

      - name: Send Teams notification
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          TEAMS_CONVERSATION_ID: ${{ secrets.TEAMS_CONVERSATION_ID }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Test notification' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '0' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
          PR_URL: ${{ github.event.pull_request.html_url || github.server_url }}
          PR_REPO: ${{ github.repository }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ', ') }}
        run: python .github/scripts/notify_pr.py
